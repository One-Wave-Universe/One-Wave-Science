<div id="ow-lattice-workstation">
  <style>
    #ow-lattice-workstation { color: var(--foreground); }
    #ow-lattice-workstation .ow-layout { display:grid; grid-template-columns:minmax(0, 1fr) 270px; gap:12px; }
    #ow-lattice-workstation .ow-stage { position:relative; min-width:0; }
    #ow-lattice-workstation canvas { width:100%; height:460px; display:block; background:color-mix(in srgb, var(--card) 72%, transparent); border-radius:10px; }
    #ow-lattice-workstation .ow-overlay { position:absolute; inset:10px 12px auto 12px; display:flex; flex-wrap:wrap; gap:8px; pointer-events:none; }
    #ow-lattice-workstation .ow-readout { background:color-mix(in srgb, var(--background) 82%, transparent); border:1px solid var(--border); border-radius:7px; padding:5px 8px; }
    #ow-lattice-workstation .ow-side { display:flex; flex-direction:column; gap:10px; }
    #ow-lattice-workstation .ow-control-block { display:grid; gap:6px; }
    #ow-lattice-workstation .ow-label-row { display:flex; justify-content:space-between; gap:8px; }
    #ow-lattice-workstation .ow-chat { display:grid; gap:7px; }
    #ow-lattice-workstation .ow-chat-log { min-height:92px; max-height:130px; overflow:auto; padding:8px; border-left:2px solid var(--border); }
    #ow-lattice-workstation .ow-status { display:flex; align-items:center; gap:6px; }
    #ow-lattice-workstation .ow-dot { width:9px; height:9px; border-radius:50%; background:var(--viz-series-2); }
    #ow-lattice-workstation .ow-dot.hold { background:var(--viz-series-4); }
    #ow-lattice-workstation .ow-dot.break { background:var(--destructive); }
    #ow-lattice-workstation .ow-actions { display:flex; flex-wrap:wrap; gap:6px; }
    #ow-lattice-workstation .ow-two { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    @media (max-width:700px) {
      #ow-lattice-workstation .ow-layout { grid-template-columns:1fr; }
      #ow-lattice-workstation canvas { height:390px; }
      #ow-lattice-workstation .ow-side { display:grid; grid-template-columns:1fr 1fr; }
      #ow-lattice-workstation .ow-chat { grid-column:1 / -1; }
    }
    @media (max-width:480px) {
      #ow-lattice-workstation .ow-side { grid-template-columns:1fr; }
      #ow-lattice-workstation canvas { height:330px; }
      #ow-lattice-workstation .ow-overlay { position:static; margin-top:8px; }
    }
  </style>

  <div class="viz-controls">
    <button id="ow-play" class="btn btn-primary" type="button"><i data-lucide="play" aria-hidden="true"></i> Run</button>
    <button id="ow-step" class="btn" type="button">Step</button>
    <button id="ow-reset" class="btn" type="button"><i data-lucide="rotate-ccw" aria-hidden="true"></i> Reset</button>
    <label class="form-label">Experiment
      <select id="ow-preset" class="form-select">
        <option value="orbit">Curvature orbit</option>
        <option value="zero">Zero-input drift</option>
        <option value="nowell">No-well control</option>
        <option value="torque">Asymmetric torque</option>
        <option value="overload">Threshold overload</option>
      </select>
    </label>
    <label class="form-check form-switch">
      <input id="ow-follow" class="form-check-input" type="checkbox" checked>
      <span class="form-check-label">Scroll with displacement</span>
    </label>
  </div>

  <div class="ow-layout">
    <div class="ow-stage">
      <canvas id="ow-canvas" role="img" aria-label="Responsive triangular lattice with a curvature well, moving bounded displacement, Field and Void oscillators, and motion trail"></canvas>
      <div class="ow-overlay text-small">
        <span class="ow-readout">q <strong id="ow-q">1.000</strong></span>
        <span class="ow-readout">a <strong id="ow-a">0.000</strong></span>
        <span class="ow-readout">p <strong id="ow-p">0.000</strong></span>
        <span class="ow-readout">cycle <strong id="ow-cycle">1/12</strong></span>
        <span class="ow-readout">spin <strong id="ow-spin">0.000</strong></span>
        <span class="ow-readout ow-status"><span id="ow-dot" class="ow-dot hold"></span><strong id="ow-gate">HOLD</strong></span>
      </div>
    </div>

    <div class="ow-side">
      <section class="ow-control-block">
        <div class="ow-label-row"><label for="ow-depth">Curvature depth</label><output id="ow-depth-v">0.72</output></div>
        <input id="ow-depth" class="form-range" type="range" min="0" max="1.4" step="0.01" value="0.72">
        <div class="ow-label-row"><label for="ow-radius">Well radius</label><output id="ow-radius-v">2.8</output></div>
        <input id="ow-radius" class="form-range" type="range" min="1.2" max="5.5" step="0.1" value="2.8">
        <div class="ow-label-row"><label for="ow-resistance">Resistance</label><output id="ow-resistance-v">0.16</output></div>
        <input id="ow-resistance" class="form-range" type="range" min="0" max="0.8" step="0.01" value="0.16">
        <div class="ow-label-row"><label for="ow-tension">Surface tension</label><output id="ow-tension-v">0.44</output></div>
        <input id="ow-tension" class="form-range" type="range" min="0" max="1.2" step="0.01" value="0.44">
        <div class="ow-label-row"><label for="ow-pressure">Internal pressure / voltage</label><output id="ow-pressure-v">0.62</output></div>
        <input id="ow-pressure" class="form-range" type="range" min="0" max="1.2" step="0.01" value="0.62">
        <div class="ow-label-row"><label for="ow-asymmetry">Shell asymmetry</label><output id="ow-asymmetry-v">0.26</output></div>
        <input id="ow-asymmetry" class="form-range" type="range" min="0" max="1" step="0.01" value="0.26">
      </section>

      <section class="ow-control-block">
        <div class="ow-two">
          <label class="form-label">Release
            <input id="ow-on" class="form-control" type="number" min="0.05" max="1" step="0.05" value="0.55">
          </label>
          <label class="form-label">Reset
            <input id="ow-off" class="form-control" type="number" min="0" max="0.95" step="0.05" value="0.25">
          </label>
        </div>
        <div class="ow-actions">
          <button id="ow-export" class="btn" type="button"><i data-lucide="download" aria-hidden="true"></i> CSV receipt</button>
          <button id="ow-wiki" class="btn" type="button">Wiki snapshot</button>
        </div>
      </section>

      <section class="ow-chat">
        <div id="ow-chat-log" class="ow-chat-log text-small" aria-live="polite">
          <div><strong>Workspace:</strong> Tell me what to change or which experiment to run.</div>
        </div>
        <label class="form-label" for="ow-chat-input">AI / human experiment dialogue</label>
        <textarea id="ow-chat-input" class="form-control" rows="3" placeholder="Example: Run the no-well control and compare its path."></textarea>
        <button id="ow-send" class="btn btn-primary btn-block" type="button"><i data-lucide="message-circle" aria-hidden="true"></i> Ask Codex</button>
      </section>
    </div>
  </div>

  <script>
    (() => {
      const root = document.getElementById('ow-lattice-workstation');
      const canvas = root.querySelector('#ow-canvas');
      const ctx = canvas.getContext('2d');
      const $ = id => root.querySelector('#' + id);
      const controls = {
        depth:$('ow-depth'), radius:$('ow-radius'), resistance:$('ow-resistance'),
        tension:$('ow-tension'), pressure:$('ow-pressure'), asymmetry:$('ow-asymmetry'),
        on:$('ow-on'), off:$('ow-off'), follow:$('ow-follow')
      };
      let running=false, last=0, accumulator=0, cameraX=0;
      let state, history=[], samples=[];

      function reset() {
        state={t:0,x:-4.2,y:-1.15,vx:1.12,vy:0.76,angle:0,spin:0,q:1,a:0,p:0,release:false,cycle:1};
        history=[]; samples=[]; cameraX=0; updateReadouts(); draw();
      }
      function applyPreset(name) {
        const sets={
          orbit:[.72,2.8,.16,.44,.62,.26,-4.2,-1.15,1.12,.76],
          zero:[0,2.8,.35,.44,0,0,0,0,0,0],
          nowell:[0,2.8,.08,.2,.55,.2,-4.2,-1.15,1.12,.76],
          torque:[.8,2.7,.13,.7,.82,.75,-4,-1,1.08,.72],
          overload:[1.05,2.1,.04,.25,1.15,.85,-3.4,-.7,1.6,1.0]
        };
        const s=sets[name];
        [controls.depth,controls.radius,controls.resistance,controls.tension,controls.pressure,controls.asymmetry].forEach((e,i)=>e.value=s[i]);
        syncLabels(); reset();
        state.x=s[6]; state.y=s[7]; state.vx=s[8]; state.vy=s[9];
      }
      function syncLabels() {
        ['depth','radius','resistance','tension','pressure','asymmetry'].forEach(k => $( 'ow-'+k+'-v').value=Number(controls[k].value).toFixed(k==='radius'?1:2));
      }
      function params() {
        return Object.fromEntries(Object.entries(controls).map(([k,v])=>[k,k==='follow'?v.checked:Number(v.value)]));
      }
      function step(dt=.016) {
        const z=params(), wx=0, wy=0;
        const dx=state.x-wx, dy=state.y-wy;
        const r2=dx*dx+dy*dy, sig=z.radius*z.radius;
        const well=Math.exp(-r2/(2*sig));
        const forceScale=-z.depth*well/(sig+.001);
        let ax=forceScale*dx-z.resistance*state.vx;
        let ay=forceScale*dy-z.resistance*state.vy;
        const radial=Math.hypot(dx,dy)+.001;
        const tangent=z.asymmetry*z.tension*well;
        ax+=-dy/radial*tangent;
        ay+= dx/radial*tangent;
        const shell=z.pressure-z.tension*(.45+.18*Math.sin(state.angle));
        const torque=z.asymmetry*shell*well + .08*(dx*ay-dy*ax);
        state.spin += (torque-.32*z.resistance*state.spin)*dt;
        state.angle += state.spin*dt;
        state.vx += ax*dt; state.vy += ay*dt;
        state.x += state.vx*dt; state.y += state.vy*dt; state.t += dt;
        const speed=Math.hypot(state.vx,state.vy);
        state.a=Math.min(1,Math.max(0,.28*speed+.48*well*z.pressure+.18*Math.abs(state.spin)));
        state.p=Math.max(-1,Math.min(1,Math.sin(state.t*3.2)));
        const mismatch=Math.min(1,Math.abs(Math.hypot(state.x,state.y)-z.radius*.72)/(z.radius+1)+Math.max(0,state.a-.86));
        state.q=Math.max(0,Math.min(1,state.q+(.22*(1-mismatch)-.28*mismatch-.3*Math.max(0,state.a-.9))*dt));
        if(!state.release && state.a>=z.on) state.release=true;
        if(state.release && state.a<=z.off) state.release=false;
        state.cycle=1+(Math.floor((state.t*3.2/Math.PI)*2)%12+12)%12;
        history.push({x:state.x,y:state.y}); if(history.length>520) history.shift();
        if(samples.length===0 || state.t-samples[samples.length-1].t>.08) {
          samples.push({t:state.t,x:state.x,y:state.y,q:state.q,a:state.a,p:state.p,spin:state.spin,gate:gateName()});
          if(samples.length>4000) samples.shift();
        }
        if(z.follow) cameraX += ((state.x-cameraX)-cameraX*.04)*.018;
        else cameraX*=.94;
        updateReadouts();
      }
      function gateName() {
        const z=params();
        if(state.q<=.18) return 'BREAK';
        if(state.a>=.9 && state.q<.65) return 'OVERRIDE';
        if(state.release) return 'RELEASE';
        if(state.a<=z.off) return 'HOLD';
        return 'RETURN';
      }
      function updateReadouts() {
        $('ow-q').textContent=state.q.toFixed(3);
        $('ow-a').textContent=state.a.toFixed(3);
        $('ow-p').textContent=(state.p>=0?'+':'')+state.p.toFixed(3);
        $('ow-cycle').textContent=state.cycle+'/12';
        $('ow-spin').textContent=state.spin.toFixed(3);
        const gate=gateName(); $('ow-gate').textContent=gate;
        $('ow-dot').className='ow-dot '+(gate==='BREAK'||gate==='OVERRIDE'?'break':gate==='HOLD'?'hold':'');
      }
      function sizeCanvas() {
        const r=canvas.getBoundingClientRect(), d=Math.min(devicePixelRatio||1,2);
        const w=Math.max(320,Math.round(r.width*d)), h=Math.round(r.height*d);
        if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;}
        return {w,h,d};
      }
      function project(x,y,z,w,h,d) {
        const scale=Math.min(w,h)/13.5, px=w/2+(x-cameraX)*scale, py=h*.54+y*scale-z*scale*.68;
        return [px,py];
      }
      function latticeHeight(x,y,z) {
        const dx=x,dy=y,r2=dx*dx+dy*dy;
        return -z.depth*2.05*Math.exp(-r2/(2*z.radius*z.radius));
      }
      function draw() {
        const {w,h,d}=sizeCanvas(), z=params();
        ctx.clearRect(0,0,w,h);
        const styles=getComputedStyle(root), fg=styles.getPropertyValue('--foreground'), border=styles.getPropertyValue('--border');
        const c1=styles.getPropertyValue('--viz-series-1'), c2=styles.getPropertyValue('--viz-series-2'), c3=styles.getPropertyValue('--viz-series-3'), c4=styles.getPropertyValue('--viz-series-4');
        ctx.lineWidth=d*.65; ctx.strokeStyle=border; ctx.globalAlpha=.58;
        const pts=[], rows=13, cols=19, sx=1.05, sy=.91;
        for(let j=-rows;j<=rows;j++){
          const row=[];
          for(let i=-cols;i<=cols;i++){
            const x=i*sx+(j&1)*sx*.5+cameraX, y=j*sy;
            row.push(project(x,y,latticeHeight(x,y,z),w,h,d));
          }
          pts.push(row);
        }
        ctx.beginPath();
        for(let j=0;j<pts.length;j++) for(let i=0;i<pts[j].length;i++){
          const p=pts[j][i];
          if(i+1<pts[j].length){ctx.moveTo(...p);ctx.lineTo(...pts[j][i+1]);}
          if(j+1<pts.length){
            const q=pts[j+1][i];ctx.moveTo(...p);ctx.lineTo(...q);
            const k=(j&1)?i+1:i-1;if(k>=0&&k<pts[j+1].length){ctx.moveTo(...p);ctx.lineTo(...pts[j+1][k]);}
          }
        }
        ctx.stroke(); ctx.globalAlpha=1;
        if(history.length>1){
          ctx.strokeStyle=c4;ctx.lineWidth=2*d;ctx.beginPath();
          history.forEach((v,i)=>{const p=project(v.x,v.y,latticeHeight(v.x,v.y,z)-.08,w,h,d);i?ctx.lineTo(...p):ctx.moveTo(...p);});ctx.stroke();
        }
        const center=project(0,0,latticeHeight(0,0,z),w,h,d);
        ctx.strokeStyle=c3;ctx.globalAlpha=.75;ctx.lineWidth=1.3*d;ctx.beginPath();ctx.arc(center[0],center[1],z.radius*Math.min(w,h)/13.5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
        const obj=project(state.x,state.y,latticeHeight(state.x,state.y,z)-.2,w,h,d);
        const rr=(13+8*state.a)*d;
        ctx.save();ctx.translate(obj[0],obj[1]);ctx.rotate(state.angle);
        ctx.fillStyle=c1;ctx.globalAlpha=.22;ctx.beginPath();ctx.ellipse(0,0,rr*(1+z.asymmetry*.55),rr*(1-z.asymmetry*.25),0,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;ctx.strokeStyle=c1;ctx.lineWidth=2*d;ctx.stroke();
        ctx.strokeStyle=c2;ctx.beginPath();ctx.moveTo(-rr*1.25,0);ctx.lineTo(rr*1.25,0);ctx.stroke();
        ctx.restore();
        const oscY=h-34*d, amp=Math.min(w*.12,85*d), mid=w*.5;
        const fv=state.p*amp;
        ctx.strokeStyle=border;ctx.lineWidth=d;ctx.beginPath();ctx.moveTo(mid-amp*1.25,oscY);ctx.lineTo(mid+amp*1.25,oscY);ctx.stroke();
        ctx.fillStyle=c1;ctx.beginPath();ctx.arc(mid+fv,oscY,6*d,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=c2;ctx.beginPath();ctx.arc(mid-fv,oscY,6*d,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=fg;ctx.font=`${11*d}px sans-serif`;ctx.textAlign='center';ctx.fillText('COMMON GROUND',mid,oscY-11*d);
      }
      function animate(ts) {
        if(running){
          const delta=Math.min(.05,(ts-last)/1000||.016);accumulator+=delta;
          while(accumulator>=.008){step(.008);accumulator-=.008;}
        }
        last=ts;draw();requestAnimationFrame(animate);
      }
      function csvReceipt() {
        const head='time,x,y,q,a,p,spin,gate\\n';
        const body=samples.map(s=>[s.t,s.x,s.y,s.q,s.a,s.p,s.spin,s.gate].map(v=>typeof v==='number'?v.toFixed(6):v).join(',')).join('\\n');
        const blob=new Blob([head+body],{type:'text/csv'}), a=document.createElement('a');
        a.href=URL.createObjectURL(blob);a.download='one-wave-lattice-receipt.csv';a.click();URL.revokeObjectURL(a.href);
      }
      $('ow-play').addEventListener('click',()=>{
        running=!running;$('ow-play').innerHTML=running?'<i data-lucide="pause" aria-hidden="true"></i> Pause':'<i data-lucide="play" aria-hidden="true"></i> Run';
        if(window.lucide) lucide.createIcons({attrs:{width:16,height:16}});
      });
      $('ow-step').addEventListener('click',()=>{running=false;step(.04);draw();});
      $('ow-reset').addEventListener('click',reset);
      $('ow-preset').addEventListener('change',e=>applyPreset(e.target.value));
      $('ow-export').addEventListener('click',csvReceipt);
      $('ow-wiki').addEventListener('click',async()=>{
        const summary=`Create a wiki-ready simulation entry from the current One-Wave lattice state: preset ${$('ow-preset').value}, q=${state.q.toFixed(3)}, a=${state.a.toFixed(3)}, p=${state.p.toFixed(3)}, spin=${state.spin.toFixed(3)}, gate=${gateName()}. Include claim limits and experiment metadata.`;
        if(window.openai?.sendFollowUpMessage) await window.openai.sendFollowUpMessage({prompt:summary,title:'Create wiki simulation entry'});
      });
      $('ow-send').addEventListener('click',async()=>{
        const input=$('ow-chat-input'), msg=input.value.trim();if(!msg)return;
        $('ow-chat-log').insertAdjacentHTML('beforeend','<div><strong>You:</strong> '+msg.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))+'</div>');
        input.value='';
        const context=`You are operating the One-Wave AI/human lattice workstation. Current preset=${$('ow-preset').value}; parameters=${JSON.stringify(params())}; state={q:${state.q.toFixed(4)},a:${state.a.toFixed(4)},p:${state.p.toFixed(4)},spin:${state.spin.toFixed(4)},gate:${gateName()},cycle:${state.cycle}}. User request: ${msg}. Explain or propose exact experiment settings, and if a code change is required, update the workstation.`;
        if(window.openai?.sendFollowUpMessage) await window.openai.sendFollowUpMessage({prompt:context,title:'Run lattice experiment'});
        else $('ow-chat-log').insertAdjacentHTML('beforeend','<div><strong>Workspace:</strong> Codex dialogue is available when opened inside the Codex conversation.</div>');
      });
      Object.entries(controls).forEach(([k,e])=>{if(!['on','off','follow'].includes(k))e.addEventListener('input',()=>{syncLabels();draw();});});
      controls.on.addEventListener('change',()=>{if(+controls.off.value>=+controls.on.value)controls.off.value=Math.max(0,+controls.on.value-.05);});
      controls.off.addEventListener('change',()=>{if(+controls.off.value>=+controls.on.value)controls.on.value=Math.min(1,+controls.off.value+.05);});
      window.addEventListener('resize',draw);
      syncLabels();reset();requestAnimationFrame(animate);
    })();
  </script>
</div>
